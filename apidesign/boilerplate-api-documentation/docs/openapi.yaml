openapi: 3.1.0
info:
  title: Template Swagger API Documentation
  description: |-
    API documentation for CV management.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/cvs:
    post:
      tags:
        - CV
      summary: Tạo mới CV cho ứng viên
      operationId: createCV
      security:
        - bearerAuth: []
      requestBody:
        description: Thông tin CV cần tạo
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_type
                - work_mode
                - mobility
                - expected_job
              properties:
                job_type:
                  type: string
                  example: "Full-time"
                work_mode:
                  type: string
                  example: "Remote"
                mobility:
                  type: string
                  example: "Sử dụng xe lăn"
                expected_job:
                  type: string
                  example: "Nhân viên nhập liệu"
                conditions:
                  type: object
                  properties:
                    prefer_near_home: { type: boolean, example: true }
                    prefer_low_traffic: { type: boolean, example: true }
                    prefer_good_company: { type: boolean, example: true }
                experiences:
                  type: array
                  items:
                    type: object
                    properties:
                      description: { type: string, example: "Thực tập sinh tại The Code Origin" }
                      working_time: { type: string, example: "3 tháng" }
                skills:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-skill-1", "uuid-skill-2"]
                certificates:
                  type: array
                  items:
                    type: string
                  example: ["Chứng chỉ Tin học văn phòng A"]
      responses:
        "201":
          description: CV created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - cv_id
                  - status
                  - message
                properties:
                  cv_id:
                    type: string
                    format: uuid
                    example: "8e5e9334-..."
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Tạo CV thành công"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    get:
      tags:
        - CV
      summary: Lấy danh sách CV của ứng viên hiện tại
      operationId: getMyCVs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Danh sách CV đã tạo"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - expected_job
                        - job_type
                        - created_at
                      properties:
                        id: { type: string, format: uuid, example: "8e5e9334-..." }
                        expected_job: { type: string, example: "Nhân viên nhập liệu" }
                        job_type: { type: string, example: "Full-time" }
                        created_at: { type: string, format: date-time, example: "2024-04-15T12:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
