openapi: 3.1.0
info:
  title: Shiftify API Documentation
  description: |-
    Hệ thống quản lý tin tuyển dụng và CV dành cho người yếu thế.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/applications:
    post:
      tags:
        - Application
      summary: Ứng viên nộp đơn vào công việc
      operationId: applyJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
                - cv_id
              properties:
                job_id:
                  type: string
                  format: uuid
                  example: "uuid-job-789"
                cv_id:
                  type: string
                  format: uuid
                  example: "uuid-cv-456"
      responses:
        "201":
          description: Nộp đơn thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Nộp đơn ứng tuyển thành công"
                  data:
                    type: object
                    required:
                      - application_id
                      - status
                      - created_at
                    properties:
                      application_id:
                        type: string
                        format: uuid
                        example: "uuid-app-001"
                      status:
                        type: string
                        example: "applied"
                      created_at:
                        type: string
                        format: date-time
                        example: "2024-04-15T20:00:00Z"
        "401":
          description: Unauthorized
        "404":
          description: Not Found (Không tìm thấy Job hoặc CV)
    get:
      tags:
        - Application
      summary: Recruiter xem danh sách người ứng tuyển
      operationId: getApplications
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          description: Lọc danh sách ứng tuyển theo ID công việc
          schema:
            type: string
            format: uuid
            example: "uuid-job-789"
        - name: status
          in: query
          description: Lọc theo trạng thái ứng tuyển (applied, interviewing, accepted, rejected)
          schema:
            type: string
            example: "applied"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - candidate
                        - cv_summary
                        - applied_at
                        - status
                      properties:
                        candidate:
                          type: object
                          properties:
                            full_name: { type: string, example: "Phạm Hoàng Vũ" }
                            phone: { type: string, example: "0123456789" }
                            avatar_url: { type: string, example: "https://..." }
                        cv_summary:
                          type: object
                          properties:
                            expected_job: { type: string, example: "Backend Developer" }
                            skills: 
                              type: array
                              items: { type: string }
                              example: ["Node.js", "PostgreSQL"]
                        applied_at:
                          type: string
                          format: date-time
                          example: "2024-04-15T20:00:00Z"
                        status:
                          type: string
                          example: "applied"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Không có quyền xem danh sách của job này)
  /api/v1/applications/{id}:
    patch:
      tags:
        - Application
      summary: Cập nhật trạng thái ứng tuyển (Duyệt/Từ chối)
      operationId: updateApplicationStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của đơn ứng tuyển cần cập nhật
          required: true
          schema:
            type: string
            format: uuid
            example: "uuid-app-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: Trạng thái mới của đơn ứng tuyển
                  enum: [applied, interviewing, accepted, rejected]
                  example: "accepted"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - updated_at
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đã cập nhật trạng thái ứng tuyển thành công"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-04-15T21:00:00Z"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Không có quyền cập nhật đơn này)
        "404":
          description: Not Found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT