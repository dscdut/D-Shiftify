  # --- Job ---
  /api/v1/jobs:
    post:
      tags:
        - Job
      summary: Nha tuyen dung dang tin tuyen dung moi
      operationId: createJob
      security:
        - bearerAuth: []
      requestBody:
        description: User registration details
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - job_type
                - work_mode
                - location
                - description
              properties:
                title: { type: string, example: "Nhan vien Cham soc khach hang" }
                job_type: { type: string, example: "Full-time" }
                work_mode: { type: string, example: "Hybrid" }
                experience_required: { type: string, example: "Khong yeu cau kinh nghiem" }
                salary_min: { type: integer, example: 7000000 }
                salary_max: { type: integer, example: 12000000 }
                location: { type: string, example: "Quan Hai Chau, Da Nang" }
                working_time: { type: string, example: "08:00 - 17:30" }
                description: { type: string, example: "Uu tien ung vien co kha nang giao tiep tot, ho tro nguoi khiem thinh..." }
                status:
                  type: string
                  enum: [open, closed, paused]
                  default: open
                  description: Trang thai khi tao moi (Mac dinh la open)
                skills:
                  type: array
                  items:
                    type: object
                    properties:
                      skill_id: { type: string, format: uuid, example: "uuid-skill-1" }
                      is_required: { type: boolean, example: true }
      responses:
        "201":
          description: Dang tin thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - job_id
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Dang tin tuyen dung thanh cong"
                  job_id:
                    type: string
                    format: uuid
                    example: "job-uuid-123"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    get:
      tags:
        - Job
      summary: Tim kiem cong viec (Danh cho Candidate)
      description: |
        Lay danh sach cac cong viec dang trong trang thai `open`. 
        API nay cho phep moi nguoi (ke ca chua dang nhap) tim kiem va xem tin tuyen dung.
      operationId: searchJobs
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
        - name: search
          in: query
          schema: { type: string }
          description: Tim kiem theo tieu de hoac ten cong ty
        - name: job_type
          in: query
          schema: { type: string }
        - name: work_mode
          in: query
          schema: { type: string, enum: [Remote, Hybrid, On-site] }
        - name: location
          in: query
          schema: { type: string }
        - name: min_salary
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                  - meta
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Lay danh sach cong viec thanh cong"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid, example: "job-uuid-123" }
                        title: { type: string, example: "Nhan vien Cham soc khach hang" }
                        status: { type: string, example: "open" }
                        company:
                          type: object
                          properties:
                            name: { type: string, example: "Cong ty ABC" }
                            logo_url: { type: string, example: "https://example.com/logo.png" }
                        location: { type: string, example: "Da Nang" }
                        job_type: { type: string, example: "Full-time" }
                        work_mode: { type: string, example: "Hybrid" }
                        salary:
                          type: object
                          properties:
                            min: { type: integer, example: 7000000 }
                            max: { type: integer, example: 12000000 }
                            currency: { type: string, example: "VND" }
                        created_at: { type: string, format: date-time, example: "2024-04-15T08:00:00Z" }
                  meta:
                    type: object
                    required: [total, page, limit, total_pages]
                    properties:
                      total: { type: integer, example: 150 }
                      page: { type: integer, example: 1 }
                      limit: { type: integer, example: 10 }
                      total_pages: { type: integer, example: 15 }

