  # --- Application ---
  /api/v1/applications:
    post:
      tags:
        - Application
      summary: Ung vien nop don vao cong viec
      operationId: applyJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
                - cv_id
              properties:
                job_id:
                  type: string
                  format: uuid
                  example: "uuid-job-789"
                cv_id:
                  type: string
                  format: uuid
                  example: "uuid-cv-456"
      responses:
        "201":
          description: Nop don thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Nop don ung tuyen thanh cong"
                  data:
                    type: object
                    required:
                      - application_id
                      - status
                      - created_at
                    properties:
                      application_id:
                        type: string
                        format: uuid
                        example: "uuid-app-001"
                      status:
                        type: string
                        example: "applied"
                      created_at:
                        type: string
                        format: date-time
                        example: "2024-04-15T20:00:00Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban can dang nhap de nop don ung tuyen" }
        "404":
          description: Not Found (Khong tim thay Job hoac CV)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cong viec hoac ho so ung tuyen" }
    get:
      tags:
        - Application
      summary: Recruiter xem danh sach nguoi ung tuyen
      operationId: getApplications
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          description: Loc danh sach ung tuyen theo ID cong viec
          schema:
            type: string
            format: uuid
            example: "uuid-job-789"
        - name: status
          in: query
          description: Loc theo trang thai ung tuyen (applied, interviewing, accepted, rejected)
          schema:
            type: string
            example: "applied"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - candidate
                        - cv_summary
                        - applied_at
                        - status
                      properties:
                        candidate:
                          type: object
                          properties:
                            full_name: { type: string, example: "Pham Hoang Vu" }
                            phone: { type: string, example: "0123456789" }
                            avatar_url: { type: string, example: "https://..." }
                        cv_summary:
                          type: object
                          properties:
                            expected_job: { type: string, example: "Backend Developer" }
                            skills: 
                              type: array
                              items: { type: string }
                              example: ["Node.js", "PostgreSQL"]
                        applied_at:
                          type: string
                          format: date-time
                          example: "2024-04-15T20:00:00Z"
                        status:
                          type: string
                          example: "applied"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem danh sach ung tuyen" }
        "403":
          description: Forbidden (Khong co quyen xem danh sach cua job nay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xem danh sach ung vien cho cong viec nay" }

