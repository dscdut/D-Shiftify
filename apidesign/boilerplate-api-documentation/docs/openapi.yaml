openapi: 3.1.0
info:
  title: Shiftify Chat API Documentation
  description: |-
    API Documentation for the Shiftify platform, focusing on communication between Candidates and Recruiters.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
tags:
  - name: Chat
    description: Cac API lien quan den he thong Chat va Conversation
paths:
  /api/v1/conversations:
    post:
      tags:
        - Chat
      summary: Tao cuoc hoi thoai moi
      description: Tao mot cuoc tro chuyen moi. He thong tu dong them nguoi tao vao danh sach nguoi tham gia.
      operationId: createConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participant_ids
              properties:
                participant_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-user-222"]
                  description: Danh sach ID nguoi dung tham gia (khong bao gom nguoi tao)
                context:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [job, system]
                      example: "job"
                    reference_id:
                      type: string
                      format: uuid
                      example: "uuid-job-789"
      responses:
        "201":
          description: Tao cuoc hoi thoai thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - conversation_id
                  - created_at
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  created_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:00:00Z"
                  message:
                    type: string
                    example: "Tao cuoc hoi thoai thanh cong"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban can dang nhap de thuc hien hanh dong nay" }
        "403":
          description: Khong co quyen tao cuoc hoi thoai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen tao cuoc hoi thoai" }
        "404":
          description: Khong tim thay nguoi dung tham gia hoac tham chieu
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Nguoi dung hoac doi tuong tham chieu khong ton tai" }
    get:
      tags:
        - Chat
      summary: Lay danh sach cuoc hoi thoai
      description: Lay danh sach cac cuoc hoi thoai cua nguoi dung hien tai. Ho tro phan trang va tim kiem.
      operationId: getConversations
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          example: 20
        - name: search
          in: query
          description: Tim kiem theo ten nguoi tham gia hoac noi dung
          schema:
            type: string
          example: "backend"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    example: 12
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - conversation_id
                        - participants
                        - last_message
                        - unread_count
                      properties:
                        conversation_id:
                          type: string
                          format: uuid
                          example: "uuid-conv-001"
                        participants:
                          type: array
                          items:
                            type: object
                            properties:
                              user_id: { type: string, format: uuid, example: "uuid-user-111" }
                              full_name: { type: string, example: "Pham Hoang Vu" }
                        last_message:
                          type: object
                          properties:
                            message_id: { type: string, format: uuid, example: "uuid-msg-050" }
                            content: { type: string, example: "Chao ban" }
                            created_at: { type: string, format: date-time, example: "2026-04-15T20:15:00Z" }
                        unread_count:
                          type: integer
                          example: 2
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem danh sach hoi thoai" }
  /api/v1/conversations/{conversation_id}:
    get:
      tags:
        - Chat
      summary: Lay chi tiet mot cuoc hoi thoai
      description: Lay thong tin chi tiet ve mot cuoc hoi thoai. Chi nguoi tham gia moi co quyen xem.
      operationId: getConversationDetail
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai can lay chi tiet
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversation_id
                  - participants
                  - created_at
                properties:
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string, format: uuid, example: "uuid-user-111" }
                        full_name: { type: string, example: "Pham Hoang Vu" }
                  created_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:00:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem chi tiet hoi thoai" }
        "403":
          description: Khong co quyen xem cuoc hoi thoai nay
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong phai la thanh vien cua cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai yeu cau" }
    delete:
      tags:
        - Chat
      summary: Xoa cuoc hoi thoai
      description: Xoa mot cuoc hoi thoai va cac du lieu lien quan (tin nhan, thanh vien). He thong uu tien su dung soft-delete.
      operationId: deleteConversation
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai can xoa
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      responses:
        "200":
          description: Xoa thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - deleted_at
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Da xoa cuoc hoi thoai"
                  deleted_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:05:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de thuc hien hanh dong nay" }
        "403":
          description: Khong co quyen xoa cuoc hoi thoai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xoa cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai de xoa" }
  /api/v1/conversations/{conversation_id}/participants:
    post:
      tags:
        - Chat
      summary: Them participant vao cuoc hoi thoai
      description: Them mot nguoi dung moi vao cuoc hoi thoai. Khong cho phep them trung nguoi dung trong cung mot cuoc hoi thoai.
      operationId: addParticipant
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai can them thanh vien
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
                  example: "uuid-user-333"
                  description: ID cua nguoi dung muon them vao
      responses:
        "201":
          description: Them thanh vien thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - participant_id
                  - conversation_id
                  - message
                properties:
                  participant_id:
                    type: string
                    format: uuid
                    example: "uuid-part-003"
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  message:
                    type: string
                    example: "Them participant thanh cong"
        "400":
          description: Yeu cau khong hop le hoac nguoi dung da ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Nguoi dung nay da co mat trong cuoc hoi thoai" }
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de thuc hien" }
        "403":
          description: Khong co quyen them thanh vien
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen them nguoi vao cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai hoac nguoi dung khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay thong tin yeu cau" }
    get:
      tags:
        - Chat
      summary: Lay danh sach participant trong cuoc hoi thoai
      description: Lay danh sach cac thanh vien dang tham gia vao mot cuoc hoi thoai.
      operationId: getConversationParticipants
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai can lay danh sach thanh vien
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - participant_id
                        - user_id
                        - created_at
                      properties:
                        participant_id:
                          type: string
                          format: uuid
                          example: "uuid-part-009"
                        user_id:
                          type: string
                          format: uuid
                          example: "uuid-user-111"
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-04-15T20:00:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem danh sach thanh vien" }
        "403":
          description: Khong co quyen xem danh sach thanh vien
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xem danh sach thanh vien cua hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai yeu cau" }
    delete:
      tags:
        - Chat
      summary: Xoa participant khoi cuoc hoi thoai
      description: Xoa mot thanh vien khoi cuoc hoi thoai. He thong uu tien su dung soft-delete cho du lieu thanh vien.
      operationId: removeParticipant
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
        - name: user_id
          in: query
          required: true
          description: ID cua nguoi dung can xoa khoi cuoc hoi thoai
          schema:
            type: string
            format: uuid
          example: "uuid-user-333"
      responses:
        "200":
          description: Xoa thanh vien thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - deleted_at
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Da xoa participant"
                  deleted_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:10:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de thuc hien" }
        "403":
          description: Khong co quyen xoa thanh vien
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xoa nguoi khoi cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai hoac thanh vien khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay thong tin thanh vien trong cuoc hoi thoai" }
  /api/v1/conversations/{conversation_id}/messages:
    post:
      tags:
        - Chat
      summary: Gui tin nhan van ban/voice
      description: Gui mot tin nhan moi vao cuoc hoi thoai. Chap nhan noi dung van ban hoac duong dan file ghi am.
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  nullable: true
                  example: "Em muon hoi them ve JD"
                  description: Noi dung tin nhan van ban
                voice_url:
                  type: string
                  nullable: true
                  example: "url_voice_hoi_JD"
                  description: Duong dan den file voice/audio
      responses:
        "201":
          description: Gui tin nhan thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - message_id
                  - conversation_id
                  - sender_id
                  - created_at
                properties:
                  message_id:
                    type: string
                    format: uuid
                    example: "uuid-msg-120"
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  sender_id:
                    type: string
                    format: uuid
                    example: "uuid-user-111"
                  created_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:20:00.00Z"
        "400":
          description: Du lieu khong hop le
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Noi dung tin nhan khong duoc de trong" }
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de gui tin nhan" }
        "403":
          description: Khong co quyen gui tin nhan trong cuoc hoi thoai nay
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong phai thanh vien cua cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai yeu cau" }
    get:
      tags:
        - Chat
      summary: Lay lich su tin nhan
      description: Lay danh sach cac tin nhan trong mot cuoc hoi thoai. Su dung cursor-based pagination de toi uu hieu nang.
      operationId: getMessages
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
        - name: cursor
          in: query
          description: ID cua tin nhan de danh dau vi tri bat dau lay tin nhan tiep theo
          schema:
            type: string
          example: "uuid-msg-090"
        - name: limit
          in: query
          description: So luong tin nhan lay ra trong mot lan goi
          schema:
            type: integer
            default: 20
          example: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  next_cursor:
                    type: string
                    nullable: true
                    example: "uuid-msg-050"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - message_id
                        - sender_id
                        - created_at
                      properties:
                        message_id:
                          type: string
                          format: uuid
                          example: "uuid-msg-120"
                        content:
                          type: string
                          nullable: true
                          example: "Em muon hoi them ve JD"
                        voice_url:
                          type: string
                          nullable: true
                          example: null
                        sender_id:
                          type: string
                          format: uuid
                          example: "uuid-user-111"
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-04-15T20:20:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem lich su tin nhan" }
        "403":
          description: Khong co quyen xem tin nhan
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xem tin nhan cua cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai yeu cau" }
  /api/v1/conversations/{conversation_id}/read:
    patch:
      tags:
        - Chat
      summary: Danh dau da doc tin nhan
      description: Cap nhat trang thai da doc tin nhan cho nguoi dung hien tai trong mot cuoc hoi thoai.
      operationId: markConversationRead
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - last_read_message_id
              properties:
                last_read_message_id:
                  type: string
                  format: uuid
                  example: "uuid-msg-120"
                  description: ID cua tin nhan cuoi cung da doc
      responses:
        "200":
          description: Thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - conversation_id
                  - unread_count
                  - updated_at
                properties:
                  status:
                    type: string
                    example: "success"
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  unread_count:
                    type: integer
                    example: 0
                  updated_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:25:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de thuc hien" }
        "403":
          description: Khong co quyen cap nhat trang thai doc
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong phai thanh vien cua cuoc hoi thoai nay" }
        "404":
          description: Khong tim thay cuoc hoi thoai hoac tin nhan
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Thong tin yeu cau khong ton tai" }
  /api/v1/messages/{message_id}:
    get:
      tags:
        - Chat
      summary: Lay chi tiet 1 tin nhan
      description: Lay thong tin chi tiet cua mot tin nhan cu the.
      operationId: getMessageDetail
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          description: ID cua tin nhan can lay chi tiet
          schema:
            type: string
            format: uuid
          example: "uuid-msg-120"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - message_id
                  - conversation_id
                  - sender_id
                  - created_at
                properties:
                  message_id:
                    type: string
                    format: uuid
                    example: "uuid-msg-120"
                  conversation_id:
                    type: string
                    format: uuid
