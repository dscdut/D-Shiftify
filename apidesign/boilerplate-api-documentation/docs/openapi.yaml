    get:
      tags:
        - Matching
      summary: Goi y ung vien phu hop cho 1 Job
      description: Dua tren yeu cau cua cong viec, he thong tim kiem va de xuat cac ung vien co ky nang va ho so phu hop nhat.
      operationId: getSuggestedCandidates
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          description: ID cua bai dang tuyen dung
          required: true
          schema:
            type: string
            format: uuid
            example: "uuid-job-789"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - job_id
                  - suggested_candidates
                properties:
                  job_id:
                    type: string
                    format: uuid
                    example: "uuid-job-789"
                  suggested_candidates:
                    type: array
                    items:
                      type: object
                      required:
                        - candidate_id
                        - full_name
                        - match_score
                        - highlight_skills
                      properties:
                        candidate_id:
                          type: string
                          format: uuid
                          example: "uuid-user-111"
                        full_name:
                          type: string
                          example: "Nguyen Van A"
                        match_score:
                          type: number
                          format: float
                          example: 95.0
                        highlight_skills:
                          type: array
                          items: { type: string }
                          example: ["Java", "Spring Boot", "SQL"]
                        disability_support:
                          type: string
                          example: "Can ho tro thiet ke giao dien tuong phan cao"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem goi y ung vien" }
        "403":
          description: Forbidden (Khong phai chu so huu Job nay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xem goi y ung vien cho cong viec nay" }
        "404":
          description: Job khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cong viec yeu cau" }

  # --- Chat ---
  /api/v1/conversations:
    post:
      tags:
        - Chat
      summary: Tao cuoc hoi thoai moi
      description: Tao mot cuoc tro chuyen moi. He thong tu dong them nguoi tao vao danh sach nguoi tham gia.
      operationId: createConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participant_ids
              properties:
                participant_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
