openapi: 3.1.0
info:
  title: Shiftify Chat API Documentation
  description: |-
    API Documentation for the Shiftify platform, focusing on communication between Candidates and Recruiters.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
tags:
  - name: Chat
    description: Cac API lien quan den he thong Chat va Conversation
paths:
  /api/v1/conversations:
    post:
      tags:
        - Chat
      summary: Tao cuoc hoi thoai moi
      description: Tao mot cuoc tro chuyen moi. He thong tu dong them nguoi tao vao danh sach nguoi tham gia.
      operationId: createConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participant_ids
              properties:
                participant_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-user-222"]
                  description: Danh sach ID nguoi dung tham gia (khong bao gom nguoi tao)
                context:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [job, system]
                      example: "job"
                    reference_id:
                      type: string
                      format: uuid
                      example: "uuid-job-789"
      responses:
        "201":
          description: Tao cuoc hoi thoai thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - conversation_id
                  - created_at
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  created_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:00:00Z"
                  message:
                    type: string
                    example: "Tao cuoc hoi thoai thanh cong"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban can dang nhap de thuc hien hanh dong nay" }
        "403":
          description: Khong co quyen tao cuoc hoi thoai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen tao cuoc hoi thoai" }
        "404":
          description: Khong tim thay nguoi dung tham gia hoac tham chieu
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Nguoi dung hoac doi tuong tham chieu khong ton tai" }
    get:
      tags:
        - Chat
      summary: Lay danh sach cuoc hoi thoai
      description: Lay danh sach cac cuoc hoi thoai cua nguoi dung hien tai. Ho tro phan trang va tim kiem.
      operationId: getConversations
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          example: 20
        - name: search
          in: query
          description: Tim kiem theo ten nguoi tham gia hoac noi dung
          schema:
            type: string
          example: "backend"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    example: 12
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - conversation_id
                        - participants
                        - last_message
                        - unread_count
                      properties:
                        conversation_id:
                          type: string
                          format: uuid
                          example: "uuid-conv-001"
                        participants:
                          type: array
                          items:
                            type: object
                            properties:
                              user_id: { type: string, format: uuid, example: "uuid-user-111" }
                              full_name: { type: string, example: "Pham Hoang Vu" }
                        last_message:
                          type: object
                          properties:
                            message_id: { type: string, format: uuid, example: "uuid-msg-050" }
                            content: { type: string, example: "Chao ban" }
                            created_at: { type: string, format: date-time, example: "2026-04-15T20:15:00Z" }
                        unread_count:
                          type: integer
                          example: 2
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem danh sach hoi thoai" }
  /api/v1/conversations/{conversation_id}:
    get:
      tags:
        - Chat
      summary: Lay chi tiet mot cuoc hoi thoai
      description: Lay thong tin chi tiet ve mot cuoc hoi thoai. Chi nguoi tham gia moi co quyen xem.
      operationId: getConversationDetail
      security:
        - bearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: ID cua cuoc hoi thoai can lay chi tiet
          schema:
            type: string
            format: uuid
          example: "uuid-conv-001"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversation_id
                  - participants
                  - created_at
                properties:
                  conversation_id:
                    type: string
                    format: uuid
                    example: "uuid-conv-001"
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string, format: uuid, example: "uuid-user-111" }
                        full_name: { type: string, example: "Pham Hoang Vu" }
                  created_at:
                    type: string
                    format: date-time
                    example: "2026-04-15T20:00:00Z"
        "401":
          description: Chua xac thuc nguoi dung
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem chi tiet hoi thoai" }
        "403":
          description: Khong co quyen xem cuoc hoi thoai nay
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong phai la thanh vien cua cuoc hoi thoai nay" }
        "404":
          description: Cuoc hoi thoai khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cuoc hoi thoai yeu cau" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT