openapi: 3.1.0
info:
  title: Template Swagger API Documentation
  description: |-
    API documentation for the template projects, created by GDSC-DUT. This documentation offers detailed insights into the common API endpoints used across all templates.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: http://localhost:3000
paths:
  /profile/v1/me:
    get:
      tags:
        - profile
      summary: Get current user profile
      description: Retrieve detailed information about the currently authenticated user.
      operationId: getCurrentUserProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Profile retrieved successfully"
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid, example: "uuid-profile" }
                      full_name: { type: string, example: "Nguyen Van A" }
                      dob: { type: string, example: "1995-05-20" }
                      gender: { type: string, example: "Male" }
                      phone: { type: string, example: "0987654321" }
                      disability_status: { type: string, example: "Khiem thi nhe" }
                      created_at: { type: string, example: "2023-10-01T08:00:00Z" }
                      devices:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, example: "uuid-device-1" }
                            name: { type: string, example: "May doc man hinh (Screen Reader)" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    patch:
      tags:
        - profile
      summary: Chinh sua thong tin cua user hien tai
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: []
      requestBody:
        description: Thong tin ho so can cap nhat
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string, example: "Nguyen Van A" }
                dob: { type: string, format: date, example: "1998-10-15" }
                gender: { type: string, example: "Nam" }
                phone: { type: string, example: "0912345678" }
                disability_status: { type: string, example: "Khuyet tat van dong nhe" }
                device_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-device-1", "uuid-device-3"]
      responses:
        "200":
          description: Cap nhat thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Cap nhat ho so thanh cong"
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid, example: "uuid-profile" }
                      full_name: { type: string, example: "Nguyen Van A" }
                      dob: { type: string, example: "1998-10-15" }
                      gender: { type: string, example: "Nam" }
                      phone: { type: string, example: "0912345678" }
                      disability_status: { type: string, example: "Khuyet tat van dong nhe" }
                      devices:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, example: "uuid-device-1" }
                            name: { type: string, example: "Xe lan tay" }
                        example: 
                          - { id: "uuid-device-1", name: "Xe lan tay" }
                          - { id: "uuid-device-3", name: "Nep chan ho tro" }
                      updated_at: { type: string, format: date-time, example: "2024-05-20T10:30:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    delete:
      tags:
        - profile
      summary: Xoa tai khoan
      operationId: deleteCurrentUserAccount
      security:
        - bearerAuth: []
      requestBody:
        description: Xac nhan mat khau de xoa tai khoan
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  example: "ConfirmPasswordToVerify"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Tai khoan cua ban da duoc vo hieu hoa."
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
  /profile/v1/me/devices:
    post:
      tags:
        - profile
      summary: Them thiet bi vao profile cua user
      operationId: addDevicesToProfile
      security:
        - bearerAuth: []
      requestBody:
        description: Danh sach ID thiet bi can them
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_ids
              properties:
                device_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid1", "uuid2"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Add devices successfully"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
  /profile/v1/assistive-devices:
    get:
      tags:
        - profile
      summary: Lay danh sach tat ca cac thiet bi ho tro co san trong he thong
      operationId: getAssistiveDevices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Danh sach thiet bi ho tro"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id: { type: string, format: uuid, example: "uuid1" }
                        name: { type: string, example: "Xe lan dien" }
                    example:
                      - { id: "uuid1", name: "Xe lan dien" }
                      - { id: "uuid2", name: "May tro thinh" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
  /profile/v1/voice-logs:
    post:
      tags:
        - profile
      summary: Luu nhat ky su dung giong noi (STT/TTS)
      operationId: createVoiceLog
      security:
        - bearerAuth: []
      requestBody:
        description: Thong tin nhat ky giong noi
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - source
                - reference_id
                - status
              properties:
                type:
                  type: string
                  enum: [stt, tts]
                  description: Loai xu ly giong noi
                  example: "stt"
                source:
                  type: string
                  enum: [cv, chat, job, system]
                  description: Nguon goi xu ly
                  example: "cv"
                reference_id:
                  type: string
                  format: uuid
                  example: "uuid-reference-id"
                status:
                  type: integer
                  example: 200
      responses:
        "201":
          description: Log created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Voice log saved successfully"
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid, example: "uuid-log-new" }
                      user_id: { type: string, format: uuid, example: "uuid-user" }
                      created_at: { type: string, format: date-time, example: "2024-05-20T10:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT