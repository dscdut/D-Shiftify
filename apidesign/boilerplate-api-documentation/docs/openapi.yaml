          in: path
          description: ID cua don ung tuyen can cap nhat
          required: true
          schema:
            type: string
            format: uuid
            example: "uuid-app-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: Trang thai moi cua don ung tuyen
                  enum: [applied, interviewing, accepted, rejected]
                  example: "accepted"
      responses:
        "200":
          description: Cap nhat thanh cong
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - updated_at
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Da cap nhat trang thai ung tuyen thanh cong"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-04-15T21:00:00Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban can dang nhap de cap nhat trang thai" }
        "403":
          description: Forbidden (Khong co quyen cap nhat don nay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen thay doi trang thai don ung tuyen nay" }
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay don ung tuyen" }

  # --- Matching ---
  /api/v1/matches/jobs:
    get:
      tags:
        - Matching
      summary: Goi y viec lam phu hop cho Candidate
      description: Dua tren Profile va CV cua ung vien, he thong se de xuat cac cong viec co do tuong quan cao nhat.
      operationId: getSuggestedJobs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - suggested_jobs
                properties:
                  suggested_jobs:
                    type: array
                    items:
                      type: object
                      required:
                        - job_id
                        - title
                        - company_name
                        - match_score
                        - reason
                      properties:
                        job_id:
                          type: string
                          format: uuid
                          example: "uuid-job-999"
                        title:
                          type: string
                          example: "Junior Node.js Developer"
                        company_name:
                          type: string
                          example: "Origin Tech"
                        match_score:
                          type: number
                          format: float
                          example: 92.5
                        reason:
                          type: string
                          example: "Phu hop 4/5 ky nang yeu cau va vi tri gan noi o cua ban"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban can dang nhap de nhan goi y viec lam" }

  /api/v1/matches/candidates/{job_id}:
    get:
      tags:
        - Matching
      summary: Goi y ung vien phu hop cho 1 Job
      description: Dua tren yeu cau cua cong viec, he thong tim kiem va de xuat cac ung vien co ky nang va ho so phu hop nhat.
      operationId: getSuggestedCandidates
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          description: ID cua bai dang tuyen dung
          required: true
          schema:
            type: string
            format: uuid
            example: "uuid-job-789"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - job_id
                  - suggested_candidates
                properties:
                  job_id:
                    type: string
                    format: uuid
                    example: "uuid-job-789"
                  suggested_candidates:
                    type: array
                    items:
                      type: object
                      required:
                        - candidate_id
                        - full_name
                        - match_score
                        - highlight_skills
                      properties:
                        candidate_id:
                          type: string
                          format: uuid
                          example: "uuid-user-111"
                        full_name:
                          type: string
                          example: "Nguyen Van A"
                        match_score:
                          type: number
                          format: float
                          example: 95.0
                        highlight_skills:
                          type: array
                          items: { type: string }
                          example: ["Java", "Spring Boot", "SQL"]
                        disability_support:
                          type: string
                          example: "Can ho tro thiet ke giao dien tuong phan cao"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Vui long dang nhap de xem goi y ung vien" }
        "403":
          description: Forbidden (Khong phai chu so huu Job nay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Ban khong co quyen xem goi y ung vien cho cong viec nay" }
        "404":
          description: Job khong ton tai
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Khong tim thay cong viec yeu cau" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
