                    example:
                      - { id: "uuid1", name: "Xe lan dien" }
                      - { id: "uuid2", name: "May tro thinh" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }

  /profile/v1/voice-logs:
    post:
      tags:
        - profile
      summary: Luu nhat ky su dung giong noi (STT/TTS)
      operationId: createVoiceLog
      security:
        - bearerAuth: []
      requestBody:
        description: Thong tin nhat ky giong noi
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - source
                - reference_id
                - status
              properties:
                type:
                  type: string
                  enum: [stt, tts]
                  description: Loai xu ly giong noi
                  example: "stt"
                source:
                  type: string
                  enum: [cv, chat, job, system]
                  description: Nguon goi xu ly
                  example: "cv"
                reference_id:
                  type: string
                  format: uuid
                  example: "uuid-reference-id"
                status:
                  type: integer
                  example: 200
      responses:
        "201":
          description: Log created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Voice log saved successfully"
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid, example: "uuid-log-new" }
                      user_id: { type: string, format: uuid, example: "uuid-user" }
                      created_at: { type: string, format: date-time, example: "2024-05-20T10:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }

  # --- CV ---
  /api/v1/cvs:
    post:
      tags:
        - CV
      summary: Tao moi CV
      operationId: createCV
      security:
        - bearerAuth: []
      requestBody:
        description: Thong tin CV can tao
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - profileId
                - jobType
                - workMode
                - mobility
                - expectedJob
              properties:
                profileId:
                  type: string
                  format: uuid
                  example: "9d83050f-3040-4c04-946e-504d3f34fdea"
                jobType:
                  type: string
                  example: "Fulltime"
                workMode:
                  type: string
                  example: "Remote"
                mobility:
                  type: string
                  example: "Wheelchair"
                expectedJob:
                  type: string
                  example: "Backend Developer"
                deviceIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example:
                    - "905c9a98-8f51-4296-84b3-d521ece0d1a2"
                    - "e4a8d1b5-ac6a-455f-8027-aaa1a4489839"
                    - "9d1dda30-7361-45c3-8b79-db9629888080"
                skills:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "Communication"
                      type:
                        type: string
                        enum:
                          - soft_skill
                          - hard_skill
                        example: "soft_skill"
                  example:
                    - name: "Communication"
                      type: "soft_skill"
                    - name: "NodeJS"
                      type: "hard_skill"
                conditions:
                  type: array
                  items:
                    type: string
                  example:
                    - "Ưu tiên công ty hỗ trợ người khuyết tật"
                    - "Ưu tiên khu vực ít giao thông"
                experiences:
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                        example: "Developed REST APIs using ExpressJS"
                      company:
                        type: string
                        example: "FPT Software"
                      position:
                        type: string
                        example: "Backend Intern"
                      startDate:
                        type: string
                        example: "2024-01"
                      endDate:
                        type: string
                        example: "2024-06"
                  example:
                    - description: "Developed REST APIs using ExpressJS"
                      company: "FPT Software"
                      position: "Backend Intern"
                      startDate: "2024-01"
                      endDate: "2024-06"
                certificates:
                  type: array
                  items:
                    type: string
                  example:
                    - "IELTS 6.5"
                customSections:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                        example: "Education"
                      content:
                        type: string
                        example: "Duy Tan University - Software Engineering"
                  example:
                    - title: "Education"
                      content: "Duy Tan University - Software Engineering"
                    - title: "Career Objective"
                      content: "Become a backend developer."
      responses:
        "201":
          description: CV created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - cv_id
                  - status
                  - message
                properties:
                  cv_id:
                    type: string
                    format: uuid
                    example: "8e5e9334-..."
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Tao CV thanh cong"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    get:
      tags:
        - CV
      summary: Lay danh sach CV cua ung vien hien tai
      operationId: getMyCVs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Danh sach CV da tao"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - expected_job
                        - job_type
                        - created_at
                      properties:
                        id: { type: string, format: uuid, example: "8e5e9334-..." }
                        expected_job: { type: string, example: "Nhan vien nhap lieu" }
                        job_type: { type: string, example: "Full-time" }
                        created_at: { type: string, format: date-time, example: "2024-04-15T12:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }

