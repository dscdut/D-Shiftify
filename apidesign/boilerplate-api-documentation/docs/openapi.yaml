openapi: 3.1.0
info:
  title: Shiftify API Documentation
  description: |-
    Hệ thống quản lý tin tuyển dụng và CV dành cho người yếu thế.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/applications:
    post:
      tags:
        - Application
      summary: Ứng viên nộp đơn vào công việc
      operationId: applyJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
                - cv_id
              properties:
                job_id:
                  type: string
                  format: uuid
                  example: "uuid-job-789"
                cv_id:
                  type: string
                  format: uuid
                  example: "uuid-cv-456"
      responses:
        "201":
          description: Nộp đơn thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Nộp đơn ứng tuyển thành công"
                  data:
                    type: object
                    required:
                      - application_id
                      - status
                      - created_at
                    properties:
                      application_id:
                        type: string
                        format: uuid
                        example: "uuid-app-001"
                      status:
                        type: string
                        example: "applied"
                      created_at:
                        type: string
                        format: date-time
                        example: "2024-04-15T20:00:00Z"
        "401":
          description: Unauthorized
        "404":
          description: Not Found (Không tìm thấy Job hoặc CV)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT