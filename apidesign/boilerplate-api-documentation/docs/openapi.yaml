openapi: 3.1.0
info:
  title: Template Swagger API Documentation
  description: |-
    API documentation for CV management.
  contact:
    email: contact@gdsc.dev
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/cvs:
    post:
      tags:
        - CV
      summary: Tạo mới CV cho ứng viên
      operationId: createCV
      security:
        - bearerAuth: []
      requestBody:
        description: Thông tin CV cần tạo
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_type
                - work_mode
                - mobility
                - expected_job
              properties:
                job_type:
                  type: string
                  example: "Full-time"
                work_mode:
                  type: string
                  example: "Remote"
                mobility:
                  type: string
                  example: "Sử dụng xe lăn"
                expected_job:
                  type: string
                  example: "Nhân viên nhập liệu"
                conditions:
                  type: object
                  properties:
                    prefer_near_home: { type: boolean, example: true }
                    prefer_low_traffic: { type: boolean, example: true }
                    prefer_good_company: { type: boolean, example: true }
                experiences:
                  type: array
                  items:
                    type: object
                    properties:
                      description: { type: string, example: "Thực tập sinh tại The Code Origin" }
                      working_time: { type: string, example: "3 tháng" }
                skills:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example: ["uuid-skill-1", "uuid-skill-2"]
                certificates:
                  type: array
                  items:
                    type: string
                  example: ["Chứng chỉ Tin học văn phòng A"]
      responses:
        "201":
          description: CV created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - cv_id
                  - status
                  - message
                properties:
                  cv_id:
                    type: string
                    format: uuid
                    example: "8e5e9334-..."
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Tạo CV thành công"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    get:
      tags:
        - CV
      summary: Lấy danh sách CV của ứng viên hiện tại
      operationId: getMyCVs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Danh sách CV đã tạo"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - expected_job
                        - job_type
                        - created_at
                      properties:
                        id: { type: string, format: uuid, example: "8e5e9334-..." }
                        expected_job: { type: string, example: "Nhân viên nhập liệu" }
                        job_type: { type: string, example: "Full-time" }
                        created_at: { type: string, format: date-time, example: "2024-04-15T12:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
  /api/v1/cvs/{id}:
    get:
      tags:
        - CV
      summary: Lấy chi tiết một CV
      operationId: getCVById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của CV cần lấy chi tiết
          required: true
          schema:
            type: string
            format: uuid
            example: "8e5e9334-..."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Chi tiết CV"
                  data:
                    type: object
                    required:
                      - id
                      - profile
                      - job_type
                      - work_mode
                      - mobility
                      - expected_job
                      - updated_at
                    properties:
                      id: { type: string, format: uuid, example: "8e5e9334-..." }
                      profile:
                        type: object
                        properties:
                          full_name: { type: string, example: "Phạm Hoàng Vũ" }
                          disability_status: { type: string, example: "Khiếm thính nhẹ" }
                      job_type: { type: string, example: "Full-time" }
                      work_mode: { type: string, example: "Remote" }
                      mobility: { type: string, example: "Sử dụng xe lăn" }
                      expected_job: { type: string, example: "Nhân viên nhập liệu" }
                      conditions:
                        type: object
                        properties:
                          prefer_near_home: { type: boolean, example: true }
                          prefer_low_traffic: { type: boolean, example: true }
                          prefer_good_company: { type: boolean, example: true }
                      experiences:
                        type: array
                        items:
                          type: object
                          properties:
                            description: { type: string, example: "Thực tập sinh tại The Code Origin" }
                            working_time: { type: string, example: "3 tháng" }
                      skills:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, example: "uuid-1" }
                            name: { type: string, example: "Node.js" }
                            type: { type: string, example: "hard" }
                      certificates:
                        type: array
                        items:
                          type: string
                        example: ["Chứng chỉ Tin học văn phòng A"]
                      updated_at: { type: string, format: date-time, example: "2024-04-15T10:00:00Z" }
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Không tìm thấy CV" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    patch:
      tags:
        - CV
      summary: Cập nhật thông tin CV
      operationId: updateCV
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của CV cần cập nhật
          required: true
          schema:
            type: string
            format: uuid
            example: "8e5e9334-..."
      requestBody:
        description: Thông tin CV cần cập nhật (hỗ trợ cập nhật từng phần)
        content:
          application/json:
            schema:
              type: object
              properties:
                expected_job: { type: string, example: "Senior Backend Developer" }
                work_mode: { type: string, example: "Hybrid" }
                conditions:
                  type: object
                  properties:
                    prefer_near_home: { type: boolean, example: false }
                experiences:
                  type: array
                  items:
                    type: object
                    properties:
                      description: { type: string }
                      working_time: { type: string }
                skills:
                  type: array
                  items:
                    type: string
                    format: uuid
                certificates:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - updated_at
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Cập nhật CV thành công"
                  updated_at:
                    type: string
                    format: date-time
                    example: "2024-04-15T10:00:00Z"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Không tìm thấy CV" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    delete:
      tags:
        - CV
      summary: Xóa CV
      operationId: deleteCV
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của CV cần xóa
          required: true
          schema:
            type: string
            format: uuid
            example: "8e5e9334-..."
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đã xóa CV thành công"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Không tìm thấy CV để xóa" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
  /api/v1/jobs:
    post:
      tags:
        - Job
      summary: Nhà tuyển dụng đăng tin tuyển dụng mới
      operationId: createJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - job_type
                - work_mode
                - location
                - description
              properties:
                title: { type: string, example: "Nhân viên Chăm sóc khách hàng" }
                job_type: { type: string, example: "Full-time" }
                work_mode: { type: string, example: "Hybrid" }
                experience_required: { type: string, example: "Không yêu cầu kinh nghiệm" }
                salary_min: { type: integer, example: 7000000 }
                salary_max: { type: integer, example: 12000000 }
                location: { type: string, example: "Quận Hải Châu, Đà Nẵng" }
                working_time: { type: string, example: "08:00 - 17:30" }
                description: { type: string, example: "Ưu tiên ứng viên có khả năng giao tiếp tốt, hỗ trợ người khiếm thính..." }
                skills:
                  type: array
                  items:
                    type: object
                    properties:
                      skill_id: { type: string, format: uuid, example: "uuid-skill-1" }
                      is_required: { type: boolean, example: true }
      responses:
        "201":
          description: Đăng tin thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - job_id
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đăng tin tuyển dụng thành công"
                  job_id:
                    type: string
                    format: uuid
                    example: "job-uuid-123"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
    get:
      tags:
        - Job
      summary: Lấy danh sách công việc (Dành cho ứng viên)
      operationId: getJobs
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: Trang hiện tại
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
          description: Số lượng bản ghi trên mỗi trang
        - name: search
          in: query
          schema: { type: string }
          description: Tìm kiếm theo tiêu đề công việc
        - name: job_type
          in: query
          schema: { type: string }
          description: Bộ lọc theo loại hình công việc (Full-time, Part-time,...)
        - name: min_salary
          in: query
          schema: { type: integer }
          description: Bộ lọc theo mức lương tối thiểu
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - page
                  - limit
                  - data
                properties:
                  total: { type: integer, example: 150 }
                  page: { type: integer, example: 1 }
                  limit: { type: integer, example: 10 }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid, example: "job-uuid-123" }
                        title: { type: string, example: "Nhân viên Chăm sóc khách hàng" }
                        company_name: { type: string, example: "Công ty ABC" }
                        logo_url: { type: string, example: "https://example.com/logo.png" }
                        location: { type: string, example: "Đà Nẵng" }
                        salary_range: { type: string, example: "7tr - 12tr" }
                        created_at: { type: string, format: date-time, example: "2024-04-15T08:00:00Z" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
