              schema:
                type: object
                required:
                  - status
                  - message
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Add devices successfully"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  message: { type: string, example: "Unauthenticated" }

  /profile/v1/assistive-devices:
    get:
      tags:
        - profile
      summary: Lay danh sach tat ca cac thiet bi ho tro co san trong he thong
      operationId: getAssistiveDevices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - data
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Danh sach thiet bi ho tro"
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id: { type: string, format: uuid, example: "uuid1" }
